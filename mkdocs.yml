site_name: Root Painter
site_url: https://jakob1379.github.io/root_painter/
repo_name: jakob1379/root_painter
repo_url: https://github.com/jakob1379/root_painter

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  features:
    - content.tabs.link
    - navigation.expand    
    - navigation.footer
    - navigation.prune
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.suggest
    - toc.follow
    - toc.integrate
  favicon: assets/icon.svg
  logo: assets/icon.svg
plugins:
  - search
markdown_extensions:
  - pymdownx.details
  - pymdownx.tilde
  - pymdownx.blocks.caption  
  - pymdownx.superfences
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  





