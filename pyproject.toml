[build-system]
requires = ["setuptools>=42", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "root_painter_trainer"
version = "0.2.27.0"
description = "Trainer (server component) for RootPainter"
readme = "README.md"
requires-python = ">=3.8"
license = { text = "GPL-2.0" }
authors = [
  { name = "Abraham George Smith" }
]
classifiers = [
  "Intended Audience :: Developers",
  "Programming Language :: Python :: 3",
  "License :: OSI Approved :: GNU General Public License v2 (GPLv2)",
  "Operating System :: OS Independent"
]
dependencies = [
  "scikit-image==0.19.3",
  "numpy==1.24.2",
  "scipy==1.10.0",
  "Pillow==9.3.0",
  "imagecodecs==2021.8.26",
  "torch==1.13.1",
  "torchvision==0.14.1"
]

[project.urls]
Homepage = "https://github.com/Abe404/root_painter"

[project.scripts]
start-trainer = "trainer:start"

[tool.setuptools.packages.find]
where = ["trainer"]
include = ["root_painter_trainer*"]
